<h1>Hydroponics Basics</h1>

<p>Hydroponics is growing plants without soil using water and nutrients.</p>
<p>Plants grow in pipes, and their roots drink nutrient water directly.</p>

<p>Draw your own hydroponics system using bottles or pipes!</p>
